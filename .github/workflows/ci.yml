name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # llama-cpp-python è escluso: i test lo mockano via conftest.py
          pip install \
            "pandas>=2.0.0" \
            "numpy>=1.26.0" \
            "matplotlib>=3.8.0" \
            "openpyxl>=3.1.0" \
            "chardet>=5.0.0" \
            "psutil>=5.9.0" \
            "Pillow>=10.0.0" \
            "fpdf2>=2.7.9" \
            pytest \
            pytest-cov \
            "coverage[toml]" \
            ruff

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing
